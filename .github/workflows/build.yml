name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller eng_math_calc.spec

      - name: Create ZIP
        run: Compress-Archive -Path "dist/*" -DestinationPath "EngMathCalc-windows.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: EngMathCalc-windows.zip

  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-13
            arch: intel
          - runner: macos-latest
            arch: apple-silicon
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller eng_math_calc.spec

      - name: Create DMG
        run: |
          hdiutil create -volname "EngMathCalc" -srcfolder dist/ -ov -format UDZO "EngMathCalc-macos-${{ matrix.arch }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-build
          path: EngMathCalc-macos-${{ matrix.arch }}.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "工程數學計算機 ${{ github.ref_name }}"
          files: |
            windows-build/EngMathCalc-windows.zip
            macos-intel-build/EngMathCalc-macos-intel.dmg
            macos-apple-silicon-build/EngMathCalc-macos-apple-silicon.dmg
          generate_release_notes: true
